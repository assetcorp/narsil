name: ir-benchmark

# One engine runs at a time. The orchestration script (run-all.sh) brings up a
# single engine behind its profile, runs the harness against it, then tears it
# down before the next. Every engine container gets the same ceiling so the
# latency numbers compare at an equal cap. The ceiling defaults to 8 GiB for the
# small BEIR sets on a laptop and is raised for million-passage corpora on a
# sized machine with BENCH_MEM_CAP (and BENCH_JVM_HEAP for the JVM engines); the
# value used is recorded in every results file.

services:
  narsil:
    profiles: ["narsil"]
    build:
      context: ..
      dockerfile: ir-benchmark/narsil-server.Dockerfile
      args:
        NARSIL_GIT_SHA: "${NARSIL_GIT_SHA:-}"
        NARSIL_GIT_DIRTY: "${NARSIL_GIT_DIRTY:-false}"
        NARSIL_VERSION: "${NARSIL_VERSION:-}"
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    environment:
      NARSIL_HOST: "0.0.0.0"
      NARSIL_PORT: "7700"
      NARSIL_ALLOW_INSECURE: "true"
      NARSIL_MAX_BODY_BYTES: "67108864"
      NARSIL_MAX_IMPORT_BYTES: "268435456"
    expose:
      - "7700"

  elasticsearch:
    profiles: ["elasticsearch"]
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      # The RRF retriever used by the hybrid track requires a non-basic license;
      # the self-generated trial unlocks it so Elasticsearch can be evaluated on
      # the same RRF fusion family as the other engines.
      xpack.license.self_generated.type: "trial"
      ES_JAVA_OPTS: "-Xms${BENCH_JVM_HEAP:-2g} -Xmx${BENCH_JVM_HEAP:-2g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"

  opensearch:
    profiles: ["opensearch"]
    image: opensearchproject/opensearch:3.7.0
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    environment:
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms${BENCH_JVM_HEAP:-2g} -Xmx${BENCH_JVM_HEAP:-2g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"

  qdrant:
    profiles: ["qdrant"]
    image: qdrant/qdrant:v1.18.2
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"

  weaviate:
    profiles: ["weaviate"]
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.2
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      QUERY_DEFAULTS_LIMIT: "25"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    expose:
      - "8080"

  typesense:
    profiles: ["typesense"]
    image: typesense/typesense:30.2
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    command: ["--data-dir", "/data", "--api-key=${BENCH_API_KEY:-localdev}", "--enable-cors"]
    volumes:
      - typesense_data:/data
    expose:
      - "8108"

  meilisearch:
    profiles: ["meilisearch"]
    image: getmeili/meilisearch:v1.48.2
    mem_limit: "${BENCH_MEM_CAP:-8g}"
    environment:
      MEILI_MASTER_KEY: "${BENCH_API_KEY:-localdev}"
      MEILI_ENV: "development"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

  harness:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BENCH_API_KEY: "${BENCH_API_KEY:-localdev}"
      BENCH_RUN_ID: "${BENCH_RUN_ID:-}"
      BENCH_MACHINE_LABEL: "${BENCH_MACHINE_LABEL:-}"
      BENCH_EMBEDDINGS_DIR: "/data/embeddings"
      BENCH_MEM_CAP: "${BENCH_MEM_CAP:-8g}"
      BENCH_DATASETS: "${BENCH_DATASETS:-}"
      IR_DATASETS_DL_TRIES: "${IR_DATASETS_DL_TRIES:-10}"
      IR_DATASETS_DL_TIMEOUT: "${IR_DATASETS_DL_TIMEOUT:-60}"
    volumes:
      - ir_datasets_cache:/data/ir_datasets
      - embeddings_cache:/data/embeddings
      - ./results:/app/results

volumes:
  ir_datasets_cache:
  embeddings_cache:
  qdrant_data:
  weaviate_data:
  typesense_data:
  meili_data:
